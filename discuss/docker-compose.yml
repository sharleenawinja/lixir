version: "3"
services:
  db:
    container_name: discuss_dev_db
    image: postgres:13
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    container_name: discuss
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
